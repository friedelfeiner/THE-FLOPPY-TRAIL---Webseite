<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Floppy Trail</title>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-font: 'Inconsolata', monospace;
            --bg-color: #FFFFFF;
            --panel-bg: #FCF2DE;
            --text-dark: rgba(0, 0, 0, 0.671);
            --text-light: rgba(0, 0, 0, 0.431);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--primary-font);
            background: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: row-reverse;
        }

        .image-container {
            flex: 1;
            background-color: #e0d9cc;
            /* fallback */
            background-image:
                url('data:image/svg+xml;charset=utf8,%3Csvg%20viewBox%3D%220%200%20512%20512%22%20width%3D%22512%22%20height%3D%22512%22%20version%3D%221.1%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%20%3Cfilter%20id%3D%22noise%22%3E%20%3CfeTurbulence%20type%3D%22fractalNoise%22%20baseFrequency%3D%220.875%22%20result%3D%22noise%22%20%2F%3E%20%3CfeColorMatrix%20type%3D%22matrix%22%20values%3D%220.46875%200%200%200%200%200%200.39453125%200%200%200%200%200%200.25390625%200%200%200%200%200%200.33984375%200%22%20%2F%3E%20%3C%2Ffilter%3E%20%3Crect%20filter%3D%22url%28%23noise%29%22%20x%3D%220%22%20y%3D%220%22%20width%3D%22512%22%20height%3D%22512%22%20fill%3D%22transparent%22%20opacity%3D%221%22%20%2F%3E%3C%2Fsvg%3E'),
                url('images/bg-2.jpg');
            background-size: 512px, cover;
            background-position: center, center;
            background-repeat: repeat, no-repeat;
        }

        .content-wrapper {
            width: 36vw;
            min-width: 480px;
            max-width: 600px;
            background-color: var(--panel-bg);
            background-image: url('data:image/svg+xml;charset=utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%201024%201024%22%20width%3D%221024%22%20height%3D%221024%22%20preserveAspectRatio%3D%22none%22%3E%20%3Cstyle%3E%20rect%20%7B%20fill%3A%20rgba(0,0,0,0.051)%3B%20transform-origin%3A%2050%25%2050%25%3B%20transform%3A%20translateX%28-25%25%29%20translateY%28-25%25%29%3B%20%7D%20%3C%2Fstyle%3E%20%3Crect%20x%3D%22256%22%20y%3D%22256%22%20width%3D%225.01%25%22%20height%3D%225.01%25%22%20%2F%3E%20%3Crect%20x%3D%22768%22%20y%3D%22768%22%20width%3D%225.01%25%22%20height%3D%225.01%25%22%20%2F%3E%3C%2Fsvg%3E');
            background-size: 93px;
            background-position: center;
            background-repeat: repeat;
            box-shadow: 0rem 1.75rem 7.625rem 0rem rgba(0, 0, 0, 0.078);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            z-index: 10;
        }

        .content {
            width: 100%;
            max-width: 440px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h1 {
            font-size: 2.625rem;
            color: var(--text-dark);
            font-weight: 400;
            line-height: 1;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.15rem;
            color: var(--text-light);
            font-weight: 400;
            line-height: 1.6;
        }

        .divider {
            width: 100%;
            height: 1.5rem;
            background-image: url("data:image/svg+xml;charset=utf8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20x%3D%220px%22%20y%3D%220px%22%20viewBox%3D%220%200%20512%20512%22%20preserveAspectRatio%3D%22none%22%3E%3Cstyle%3Epath%20%7Bfill%3A%20none%3Bstroke-width%3A%201.5px%3Bstroke%3A%20rgba(0,0,0,0.212)%3Bstroke-linecap%3Around%3Bvector-effect%3A%20non-scaling-stroke%3B%7D%3C%2Fstyle%3E%3Cpath%20d%3D%22M-8%2C400l264-288%20M520%2C400L256%2C112%22%20%2F%3E%3C%2Fsvg%3E");
            background-size: auto 62.6%;
            background-position: center center;
            background-repeat: repeat-x;
            margin: 0.5rem 0;
        }

        ul.links {
            display: flex;
            flex-direction: column;
            gap: 0.625rem;
            list-style: none;
        }

        ul.links a {
            display: flex;
            align-items: center;
            text-decoration: none;
            font-size: 1.15rem;
            font-weight: 500;
            border-radius: 0.75rem;
            padding: 0.85rem 1.5rem;
            color: var(--text-light);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 1.2;
        }

        ul.links a:hover {
            transform: scale(1.04) translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
        }

        ul.links a span {
            flex-grow: 1;
        }

        ul.links a svg {
            width: 1.875rem;
            height: 1.875rem;
            fill: var(--text-light);
            margin-left: 1rem;
            flex-shrink: 0;
        }

        .link-insta {
            background-color: #FFC369;
        }

        .link-fb {
            background-color: #F7955E;
        }

        .link-yt {
            background-color: #FF7A7A;
        }

        .link-coffee {
            background-color: #FC6D8F;
        }

        .link-email {
            background-color: #A67EE6;
        }

        ul.icons {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            list-style: none;
        }

        ul.icons a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 2.25rem;
            height: 2.25rem;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        ul.icons a:hover {
            transform: scale(1.2) translateY(-2px);
        }

        ul.icons svg {
            width: 100%;
            height: 100%;
            fill: var(--text-light);
        }

        /* Animations */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animated {
            opacity: 0;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h1.animated {
            animation-delay: 0.1s;
        }

        p.animated {
            animation-delay: 0.2s;
        }

        .div-1.animated {
            animation-delay: 0.3s;
        }

        .links li:nth-child(1).animated {
            animation-delay: 0.4s;
        }

        .links li:nth-child(2).animated {
            animation-delay: 0.45s;
        }

        .links li:nth-child(3).animated {
            animation-delay: 0.5s;
        }

        .links li:nth-child(4).animated {
            animation-delay: 0.55s;
        }

        .links li:nth-child(5).animated {
            animation-delay: 0.6s;
        }

        .div-2.animated {
            animation-delay: 0.7s;
        }

        ul.icons li.animated {
            opacity: 0;
            animation-fill-mode: forwards;
        }

        ul.icons li:nth-child(1).animated {
            animation-delay: 0.75s;
        }

        ul.icons li:nth-child(2).animated {
            animation-delay: 0.8s;
        }

        ul.icons li:nth-child(3).animated {
            animation-delay: 0.85s;
        }

        /* Responsive */
        @media (max-width: 980px) {
            body {
                flex-direction: column;
            }

            .image-container {
                height: 45vh;
                min-height: 250px;
                flex: none;
            }

            .content-wrapper {
                width: 100%;
                min-width: unset;
                max-width: none;
                padding: 3rem 2rem;
                box-shadow: none;
            }

            h1 {
                font-size: 2.375rem;
            }
        }
    </style>
</head>
